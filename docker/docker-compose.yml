# Centralized Docker Compose for Shogun (Tenshu) + Gensui (fleet management)
# — BUILD mode: builds images from source. See docker-compose.image.yml for
# the variant that pulls prebuilt images from Docker Hub instead.
#
# Run from this directory: `cd docker && docker compose up -d --build`
# (or `docker compose -f docker/docker-compose.yml up -d --build` from the repo root)
#
# Both Dockerfiles stay at their original locations (repo root and gensui/)
# because their COPY instructions are relative to those paths — see
# docs/RUNBOOK.md for the history of path bugs that were fixed by keeping
# build contexts anchored at the repo root.

services:
  shogun:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: shogun-afm
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - shogun_data:/app/data
      - shogun_logs:/app/logs
      - shogun_configs:/app/configs
      - shogun_vault:/app/vault

  gensui:
    build:
      context: ..
      dockerfile: gensui/Dockerfile
    container_name: gensui-afm
    restart: unless-stopped
    env_file:
      - ../gensui/.env
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - gensui_data:/app/data
      - gensui_logs:/app/logs

  gensui-nginx:
    image: nginx:1.27-alpine
    container_name: gensui-nginx
    profiles:
      - server
    restart: unless-stopped
    depends_on:
      - gensui
    volumes:
      - ../gensui/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../gensui/certs:/etc/nginx/certs:ro
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"

volumes:
  # External: true + explicit `name:` pins these to the volumes already
  # created by the previous per-service compose files (docker-compose.yml
  # at the repo root, gensui/docker-compose.yml), so switching to this
  # centralized file does NOT create fresh (empty) volumes or orphan
  # existing data. Compose's default project-name-based prefix would
  # otherwise differ here (this file lives in docker/), producing new
  # volume names and silently losing access to existing data.
  shogun_data:
    external: true
    name: repo_shogun_data
  shogun_logs:
    external: true
    name: repo_shogun_logs
  shogun_configs:
    external: true
    name: repo_shogun_configs
  shogun_vault:
    external: true
    name: repo_shogun_vault
  gensui_data:
    external: true
    name: gensui_gensui_data
  gensui_logs:
    external: true
    name: gensui_gensui_logs
