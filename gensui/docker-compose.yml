services:
  gensui:
    build:
      context: ..
      dockerfile: gensui/Dockerfile
    container_name: gensui
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - gensui_data:/app/data
      - gensui_logs:/app/logs

  nginx:
    image: nginx:1.27-alpine
    container_name: gensui-nginx
    profiles:
      - server
    restart: unless-stopped
    depends_on:
      - gensui
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    ports:
      - "127.0.0.1:80:80"
      - "127.0.0.1:443:443"

volumes:
  gensui_data:
  gensui_logs:
